version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Secret=super-secret-jwt-key-minimum-32-chars!!
      - Jwt__Issuer=matrix-mizrachi
      - Jwt__Audience=matrix-mizrachi-client
      - Mockoon__BaseUrl=http://mockoon:3001
      - Kafka__Enabled=true
      - Kafka__BootstrapServers=kafka:9092
    depends_on:
      - kafka
      - mockoon
      - redis
    networks:
      - dna-network

  mockoon:
    image: mockoon/cli:latest
    command: ["start", "--data", "/data/mockoon-environment.json", "--port", "3001"]
    volumes:
      - ./mockoon/mockoon-environment.json:/data/mockoon-environment.json:ro
    ports:
      - "3001:3001"
    networks:
      - dna-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - dna-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - dna-network

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    networks:
      - dna-network

networks:
  dna-network:
    driver: bridge
